<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Bidding Player favicon: coral rounded-square with a play triangle.
       Matches the .logo gradient used in the dashboard + docs sidebar. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d97757"/>
      <stop offset="1" stop-color="#b8654b"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Play triangle, optically centered (slight right shift compensates for visual bias) -->
  <path d="M25 19 L25 45 L47 32 Z" fill="#1a0e08"/>
  <!-- Auction tick mark (small dot below) to hint "bidding", not just "play" -->
  <circle cx="32" cy="52" r="2.2" fill="#fafaf7" opacity="0.7"/>
</svg>
